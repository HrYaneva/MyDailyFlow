<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация – MyDailyFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
<button id="langSwitcher" class="lang-btn">🇧🇬</button>

    <div class="auth-container card">

        <h2 id="authTitle">Регистрация</h2>

        <label id="authEmailLabel" for="registerEmail"></label>
        <input type="email" id="registerEmail" placeholder="Имейл">

        <label id="authPasswordLabel" for="registerPassword"></label>
        <input type="password" id="registerPassword" placeholder="Парола">

        <button id="registerBtn" class="primary">Регистрация</button>

        <p id="haveAccountText">
            Имаш акаунт?
            <a id="goToLoginLink" href="login.html">Вход</a>
        </p>

    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

    <script src="script.js"></script>
</body>
</html>
