<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDailyFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
        <h1 id="title">MyDailyFlow</h1>

        <div class="top-buttons">
            <button id="langToggle">BG</button>
            <button id="themeToggle">🌙</button>
        </div>
    </header>

    <section class="add-task card">
        <h2 id="newTaskTitle">Нова задача</h2>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Въведи задача...">
        </div>

        <div class="input-row">
            <select id="categorySelect">
                <option value="work">Работа</option>
                <option value="home">Дом</option>
                <option value="school">Училище</option>
                <option value="personal">Лични</option>
            </select>

            <select id="prioritySelect">
                <option value="low">Нисък приоритет</option>
                <option value="medium">Среден приоритет</option>
                <option value="high">Висок приоритет</option>
            </select>
        </div>

        <button id="addTaskBtn" class="primary">Добави</button>
    </section>

    <section class="tasks-section card">
        <h2 id="myTasksTitle">Моите задачи</h2>

        <div class="filters">
            <button data-filter="all" class="active" id="filterAll">Всички</button>
            <button data-filter="done" id="filterDone">Готови</button>
            <button data-filter="pending" id="filterPending">Неготови</button>
        </div>

        <ul id="taskList"></ul>
    </section>

    <script src="script.js"></script>
</body>
</html>
