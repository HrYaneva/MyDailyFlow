<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDailyFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="top-bar">
        <h1 id="title">MyDailyFlow</h1>

       <div class="user-profile-box">
    <div class="user-details">
       
        <span id="userName"></span>
    </div>
     <span class="user-icon">👤</span>
    <button id="logoutBtn">Изход</button>
</div>
        <div class="top-buttons">
            <button id="langToggle">BG</button>
            <button id="themeToggle">🌙</button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>

        <!-- ========================= -->
        <!--        TASKS TAB          -->
        <!-- ========================= -->
        <section id="tasksTab" class="tab active">

            <!-- SEARCH BAR -->
            <div class="search-box card">
                <input type="text" id="searchInput" placeholder="Търси задача...">
            </div>

            <!-- ADD TASK -->
            <section class="add-task card">
                <h2 id="newTaskTitle">Нова задача</h2>

                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="Въведи задача...">
                </div>

                <div class="input-row">
                    <select id="categorySelect">
                        <option value="work">Работа</option>
                        <option value="home">Дом</option>
                        <option value="school">Училище</option>
                        <option value="personal">Лични</option>
                    </select>

                    <select id="prioritySelect">
                        <option value="low">Нисък приоритет</option>
                        <option value="medium">Среден приоритет</option>
                        <option value="high">Висок приоритет</option>
                    </select>
                </div>

                <div class="input-row">
                    <input type="date" id="dateInput">
                </div>

                <button id="addTaskBtn" class="primary">Добави</button>
            </section>

            <!-- FILTERS -->
            <section class="tasks-section card">
                <h2 id="myTasksTitle">Моите задачи</h2>

                <div class="filters">
                    <button data-filter="all" class="active" id="filterAll">Всички</button>
                    <button data-filter="today" id="filterToday">Днес</button>
                    <button data-filter="week" id="filterWeek">Седмица</button>
                    <button data-filter="done" id="filterDone">Готови</button>
                    <button data-filter="pending" id="filterPending">Неготови</button>
                </div>

                <ul id="taskList" class="draggable-list"></ul>
            </section>

        </section>

        <!-- ========================= -->
        <!--      STATISTICS TAB       -->
        <!-- ========================= -->
        <section id="statsTab" class="tab">

            <h2 class="stats-title">Статистики</h2>

            <div class="stats-grid">

                <div class="stat-card blue">
                    <h3 id="statTotal">0</h3>
                    <p id="statTotalLabel">Общо задачи</p>
                </div>

                <div class="stat-card green">
                    <h3 id="statDone">0</h3>
                    <p id="statDoneLabel">Готови</p>
                </div>

                <div class="stat-card purple">
                    <h3 id="statToday">0</h3>
                    <p id="statTodayLabel">За днес</p>
                </div>

                <div class="stat-card orange">
                    <h3 id="statWeek">0</h3>
                    <p id="statWeekLabel">За седмицата</p>
                </div>

                <div class="stat-card yellow">
                    <h3 id="statPercent">0%</h3>
                    <p id="statPercentLabel">Процент изпълнение</p>
                </div>

            </div>

        </section>

    </main>

    <!-- ========================= -->
    <!--      BOTTOM NAV BAR       -->
    <!-- ========================= -->
    <nav class="bottom-nav">
        <button id="navTasks" class="active">
            📋<br><span id="navTasksLabel">Задачи</span>
        </button>

        <button id="navStats">
            📊<br><span id="navStatsLabel">Статистики</span>
        </button>
    </nav>

     <!-- Firebase SDK -->
<!-- Firebase v8 (старият синтаксис, който твоят код използва) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Основен скрипт -->
<script src="script.js"></script>
</body>
</html>
